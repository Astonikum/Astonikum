name: Bust Image Cache

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update image URL timestamp
        run: |
          python3 -c "
          import re, time
          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()
          
          ts = str(int(time.time()))
          
          def repl(m):
              url = m.group(0)
              # Если параметр &t= уже есть, меняем его, если нет - добавляем в конец
              return re.sub(r'&t=\d+', f'&t={ts}', url) if '&t=' in url else url + f'&t={ts}'
          
          # Ищем вашу ссылку на top-langs и обновляем её
          new_content = re.sub(r'https://github-readme-stats-fast\.vercel\.app/api/top-langs/\?[^)\s]*', repl, content)
          
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_content)
          "

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "chore: bust image cache with new URL" || exit 0
          git push
